services:

  app:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      # db:
      #   condition: service_healthy
    env_file:
      - .env
    stdin_open: true
    tty: true
  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    env_file:
      - .env

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
    - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: